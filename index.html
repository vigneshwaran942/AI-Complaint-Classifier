<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Customer Support</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      background: #1e293b;
      padding: 30px;
      border-radius: 12px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
    }
    h2 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 24px;
    }
    textarea {
      width: 100%;
      height: 120px;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid #475569;
      background: #0f172a;
      color: white;
      font-family: inherit;
      font-size: 14px;
      resize: vertical;
    }
    textarea:focus { outline: none; border-color: #3b82f6; }
    button {
      width: 100%;
      padding: 12px;
      background: #3b82f6;
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #2563eb; }
    button:active { background: #1d4ed8; }
    .result {
      margin-top: 20px;
      padding: 15px;
      background: #334155;
      border-radius: 8px;
      display: none;
    }
    .result.show { display: block; }
    .result p { margin: 10px 0; line-height: 1.6; }
    .result b { color: #60a5fa; }
  </style>
</head>
<body>
  <div class="container">
    <h2> AI Customer Support</h2>
    <textarea id="inputText" placeholder="Enter your complaint or question..."></textarea>
    <button id="analyzeBtn">Get Solution</button>
    <div class="result" id="result"></div>
  </div>
  <script src="/src/main.js"></script>
</body>
</html>
